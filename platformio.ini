; Half Decent Espresso Scale — ESP32-S3 Super Mini breadboard
; Compatible with Flowlog (Decent Scale BLE protocol)
;
; Super Mini (common): ESP32-S3FH4R2 — 4MB flash + 2MB PSRAM

[env:esp32-s3-super-mini]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Match real silicon (esptool reports 4MB, not the 8MB DevKitM default)
board_upload.flash_size = 4MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = default.csv
; FH4R2: flash in QIO, PSRAM often OPI — enable if you use PSRAM later
; board_build.arduino.memory_type = qio_opi

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=1

lib_deps =
  olkal/HX711_ADC@^1.2.12
  olikraus/U8g2@^2.35.19
  h2zero/NimBLE-Arduino@^1.4.2

monitor_filters =
  esp32_exception_decoder
  time
