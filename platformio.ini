; Half Decent Espresso Scale — ESP32-S3 Super Mini breadboard
; Compatible with Flowlog (Decent Scale BLE protocol)
;
; Super Mini (common): ESP32-S3FH4R2 — 4MB flash + 2MB PSRAM
; default.csv: dual OTA app slots (~1.25 MB each)

[env:esp32-s3-super-mini]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; Match real silicon (esptool reports 4MB, not the 8MB DevKitM default)
board_upload.flash_size = 4MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = default.csv

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=1

lib_deps =
  olkal/HX711_ADC@^1.2.12
  olikraus/U8g2@^2.35.19
  h2zero/NimBLE-Arduino@^1.4.2

monitor_filters =
  esp32_exception_decoder
  time

; Wireless firmware update once the scale is on your LAN
; (ArduinoOTA password: scaleota — see include/config.h)
;   pio run -t upload -e ota --upload-port 192.168.x.x
;   pio run -t upload -e ota --upload-port half-decent.local
[env:ota]
extends = env:esp32-s3-super-mini
upload_protocol = espota
upload_port = half-decent.local
upload_flags =
  --auth=scaleota
